name: Test image

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'uos-entrypoint.sh'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t unifi-os-server-test .

      - name: Start container
        run: |
          docker run -d \
            --name unifi-test \
            --privileged \
            --cgroupns host \
            --stop-signal SIGRTMIN+3 \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /run:exec \
            --tmpfs /run/lock \
            --tmpfs /tmp:exec \
            --tmpfs /var/lib/journal \
            --tmpfs /var/opt/unifi/tmp:size=64m \
            -e UOS_SYSTEM_IP=127.0.0.1 \
            -e TZ=UTC \
            unifi-os-server-test

      - name: Wait for UniFi service to become active
        run: |
          echo "Polling for UniFi service (max 5 minutes)..."
          for i in $(seq 1 30); do
            if docker exec unifi-test systemctl is-active --quiet unifi 2>/dev/null; then
              echo "UniFi is active after ~$((i * 10))s"
              exit 0
            fi
            echo "[$i/30] not ready, retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for UniFi service"
          exit 1

      - name: Verify port 443 is listening
        run: docker exec unifi-test ss -tlnp | grep -q ':443'

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "--- docker logs ---"
          docker logs unifi-test || true
          echo "--- journalctl ---"
          docker exec unifi-test journalctl -b --no-pager || true
          echo "--- failed units ---"
          docker exec unifi-test systemctl list-units --state=failed --no-pager || true

  publish:
    needs: test
    if: github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from Dockerfile
        id: version
        run: |
          VERSION=$(grep -oP 'UOS_SERVER_VERSION="\K[^"]+' Dockerfile)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "UniFi OS Server ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
